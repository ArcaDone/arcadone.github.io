<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="theme-color" content="#1f6dbc">
    <meta http-equiv="refresh" content="0; url=/scan/">
    <link rel="canonical" href="https://arcadone.github.io/scan/">
    <title>Lattosio Free</title>
    <style>
      :root {
        color-scheme: light;
        --app-blue: #1f6dbc;
        --ink: #172033;
      }

      * {
        box-sizing: border-box;
      }

      body {
        min-height: 100vh;
        margin: 0;
        display: grid;
        place-items: center;
        padding: 24px;
        background: var(--app-blue);
        color: #ffffff;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        text-align: center;
      }

      main {
        width: min(100%, 420px);
      }

      img {
        width: 96px;
        height: 96px;
        border-radius: 24px;
        box-shadow: 0 16px 34px rgba(23, 32, 51, 0.22);
      }

      h1 {
        margin: 22px 0 10px;
        font-size: clamp(2.2rem, 9vw, 3.4rem);
        line-height: 1;
        letter-spacing: 0;
      }

      p {
        margin: 0 0 24px;
        color: rgba(255, 255, 255, 0.84);
        font-size: 1.05rem;
        line-height: 1.5;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 12px 18px;
        border-radius: 8px;
        background: #ffffff;
        color: var(--ink);
        font-weight: 800;
        text-decoration: none;
      }
    </style>
    <script>
      window.location.replace("/scan/");
    </script>
  </head>
  <body>
    <main>
      <img src="/screens/ic_ios.png" alt="Icona Lattosio Free">
      <h1>Lattosio Free</h1>
      <p>Ti stiamo portando alla pagina dell'app.</p>
      <a href="/scan/">Apri Lattosio Free</a>
    </main>
  </body>
</html>
