<!doctype html>
<html lang="it">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Lattosio Free</title>
    <style>
      :root {
        color-scheme: light;
        --background: #f7f8f5;
        --text: #1f2933;
        --muted: #52606d;
        --accent: #2f855a;
        --accent-dark: #276749;
        --border: #d9e2dc;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        padding: 32px 20px;
        background: var(--background);
        color: var(--text);
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      main {
        width: min(100%, 560px);
        text-align: center;
      }

      h1 {
        margin: 0 0 16px;
        font-size: clamp(2rem, 8vw, 3.5rem);
        line-height: 1.05;
        letter-spacing: 0;
      }

      p {
        margin: 0 auto 28px;
        max-width: 420px;
        color: var(--muted);
        font-size: 1.125rem;
        line-height: 1.6;
      }

      .store-links {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        gap: 12px;
      }

      a {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-width: 150px;
        min-height: 48px;
        padding: 12px 18px;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: #ffffff;
        color: var(--accent-dark);
        font-weight: 700;
        text-decoration: none;
      }

      a:first-child {
        background: var(--accent);
        border-color: var(--accent);
        color: #ffffff;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>Lattosio Free</h1>
      <p>Scansiona prodotti e scopri se contengono lattosio.</p>
      <div class="store-links" aria-label="Link agli store">
        <a href="#">App Store</a>
        <a href="#">Google Play</a>
      </div>
    </main>
  </body>
</html>
